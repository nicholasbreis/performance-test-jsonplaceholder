version: "3.8"

services:
  locust-10u:
    build: .
    volumes:
      - ./results:/app/results
    command: >
      --headless
      -u 10
      -r 2
      --run-time 60s
      --csv=/app/results/results_10u
      --host=https://jsonplaceholder.typicode.com

  locust-50u:
    build: .
    volumes:
      - ./results:/app/results
    command: >
      --headless
      -u 50
      -r 5
      --run-time 60s
      --csv=/app/results/results_50u
      --host=https://jsonplaceholder.typicode.com
    depends_on:
      locust-10u:
        condition: service_completed_successfully

  locust-100u:
    build: .
    volumes:
      - ./results:/app/results
    command: >
      --headless
      -u 100
      -r 10
      --run-time 60s
      --csv=/app/results/results_100u
      --host=https://jsonplaceholder.typicode.com
    depends_on:
      locust-50u:
        condition: service_completed_successfully
